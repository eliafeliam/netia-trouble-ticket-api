# Production overrides. Spring Boot always loads application.yml first, then merges this file
# on top when SPRING_PROFILES_ACTIVE=prod — so only the production-specific deltas live here.
spring:
  # Java 21 virtual threads: each blocking request runs on a lightweight virtual thread instead
  # of pinning an OS thread. For a stateless, DB-blocking API this raises throughput dramatically
  # without rewriting to reactive — the "golden middle" vs WebFlux/R2DBC (no N+1/tx complexity).
  threads:
    virtual:
      enabled: true

  flyway:
    # In production the application pods do NOT migrate (the migration Job / initContainer does).
    # This default can still be overridden per-pod via the FLYWAY_ENABLED env var.
    enabled: ${FLYWAY_ENABLED:false}

logging:
  level:
    # Quieter, no SQL/parameter logging in prod (avoids leaking PII into logs — GDPR).
    root: INFO
    com.netia: INFO
    org.springframework.security: WARN
    org.hibernate.SQL: WARN
    org.hibernate.type.descriptor.sql.BasicBinder: WARN
