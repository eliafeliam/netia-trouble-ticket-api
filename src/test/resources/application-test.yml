spring:
  application:
    name: trouble-ticket-api

  jpa:
    hibernate:
      # WHY validate (not create-drop): forces Flyway migrations to run so schema
      # matches production exactly. create-drop would bypass Flyway and hide migration bugs.
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: false

  # WHY no datasource.url here:
  #   TroubleTicketControllerIntegrationTest uses @AutoConfigureTestDatabase(replace=NONE)
  #   + Testcontainers @ServiceConnection which injects the URL automatically.
  #   RLSIntegrationTest does the same via @DataJpaTest + @AutoConfigureTestDatabase(replace=NONE).
  flyway:
    enabled: true
    locations: classpath:db/migration
    # WHY baseline-on-migrate: allows Flyway to work on a fresh Testcontainers DB
    # that has no flyway_schema_history table yet.
    baseline-on-migrate: true

  data:
    redis:
      # Tests connect to a real Redis on localhost:6379 (started by docker-compose or CI service).
      # WHY not mock Redis: IdempotencyService and RateLimitFilter use Redis commands that
      # are hard to mock correctly — a real instance gives confidence the integration works.
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

jwt:
  secret: test-secret-key-which-is-minimum-32-characters-long-for-hs256
  expiration: 86400000

rate-limit:
  requests-per-minute: 10000

logging:
  level:
    root: WARN
    com.netia: DEBUG
